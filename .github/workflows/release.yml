name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    name: Build & upload binaries
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.12.0"

      - name: Cache Mix deps (prod)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-prod-

      - name: Install dependencies (prod)
        run: mix deps.get --only prod

      - name: Build Linux x86_64 binary
        run: MIX_ENV=prod mix release
        env:
          BURRITO_TARGET: linux_x86_64

      - name: Rename Linux binary
        run: mv burrito_out/agentless_monitor burrito_out/agentless-monitor-linux-x86_64

      - name: Build Windows x86_64 binary
        run: MIX_ENV=prod mix release
        env:
          BURRITO_TARGET: windows_x86_64

      - name: Rename Windows binary
        run: mv burrito_out/agentless_monitor.exe burrito_out/agentless-monitor-windows-x86_64.exe

      - name: Generate checksums
        run: |
          cd burrito_out
          sha256sum agentless-monitor-linux-x86_64 agentless-monitor-windows-x86_64.exe > checksums.txt
          cat checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.upload_url }}
          files: |
            burrito_out/agentless-monitor-linux-x86_64
            burrito_out/agentless-monitor-windows-x86_64.exe
            burrito_out/checksums.txt

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentless-monitor-linux-x86_64
          path: burrito_out/agentless-monitor-linux-x86_64

      - name: Upload Windows x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentless-monitor-windows-x86_64
          path: burrito_out/agentless-monitor-windows-x86_64.exe
