name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.12.0"

      - name: Cache Mix deps (prod)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-prod-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-prod-

      - name: Install dependencies (prod)
        run: mix deps.get --only prod

      - name: Build Linux x86_64 binary
        run: MIX_ENV=prod mix release
        env:
          BURRITO_TARGET: linux_x86_64

      - name: Rename Linux binary
        run: mv burrito_out/agentless_monitor burrito_out/agentless-monitor-linux-x86_64

      - name: Build Windows x86_64 binary
        run: MIX_ENV=prod mix release
        env:
          BURRITO_TARGET: windows_x86_64

      - name: Rename Windows binary
        run: mv burrito_out/agentless_monitor.exe burrito_out/agentless-monitor-windows-x86_64.exe

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: agentless-monitor-linux-x86_64
          path: burrito_out/agentless-monitor-linux-x86_64

      - name: Upload Windows x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: agentless-monitor-windows-x86_64
          path: burrito_out/agentless-monitor-windows-x86_64.exe
